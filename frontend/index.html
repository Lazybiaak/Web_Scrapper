<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>IPO Bulk Checker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h2>IPO Bulk Checker</h2>

    <select id="ipoSelect">
      <option value="12345">Sample IPO 1</option>
      <option value="67890">Sample IPO 2</option>
    </select>

    <textarea id="boids" placeholder="Enter BOIDs, one per line"></textarea>

    <button id="checkBtn">Check Results</button>

    <div id="results"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
